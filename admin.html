<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshCuts Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    nav { background: #111; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-size: 18px; font-weight: bold; color: white; }
    nav button { padding: 7px 16px; border-radius: 8px; border: 1px solid #444; background: transparent; color: white; cursor: pointer; font-size: 14px; }
    nav button:hover { background: #333; }
    .page { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
    .card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    h2 { font-size: 20px; font-weight: bold; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; }
    .btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #111; color: white; font-size: 15px; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #333; }
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; }
    .alert.error { background: #fdecea; color: #b71c1c; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .stat { background: white; border: 1px solid #eee; border-radius: 12px; padding: 1.25rem; text-align: center; }
    .stat .number { font-size: 32px; font-weight: bold; color: #111; }
    .stat .label { font-size: 13px; color: #888; margin-top: 4px; }
    .booking-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #eee; font-size: 14px; gap: 12px; }
    .booking-row:last-child { border-bottom: none; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 12px; }
    .badge.pending { background: #fff8e1; color: #f57f17; }
    .badge.confirmed { background: #e6f9ee; color: #1a7a3f; }
    .badge.cancelled { background: #fdecea; color: #b71c1c; }
    select { padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; cursor: pointer; }
    .hidden { display: none !important; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; }
    .filter-btn.active { background: #111; color: white; border-color: #111; }
    input[type="text"] { padding: 7px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }
  </style>
</head>
<body>

<nav>
  <div class="logo">✂️ FreshCuts — Admin</div>
  <div id="nav-auth" class="hidden">
    <span id="nav-name" style="font-size:14px;color:#aaa;margin-right:12px;"></span>
    <button onclick="logout()">Log out</button>
  </div>
</nav>

<!-- LOGIN -->
<div class="page" id="page-login">
  <div style="max-width:380px;margin:4rem auto;">
    <h2>Admin login</h2>
    <div class="card">
      <div id="login-alert"></div>
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="admin@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn" onclick="login()">Log in</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="page hidden" id="page-dashboard">
  <h2>Dashboard</h2>
  <div class="stats" id="stats"></div>

  <h2>All bookings</h2>
  <div class="card">
    <div class="filter-bar">
      <input type="text" id="search" placeholder="Search customer or service..." oninput="filterBookings()" style="flex:1;min-width:180px;">
      <button class="filter-btn active" onclick="filterByStatus('all', this)">All</button>
      <button class="filter-btn" onclick="filterByStatus('pending', this)">Pending</button>
      <button class="filter-btn" onclick="filterByStatus('confirmed', this)">Confirmed</button>
      <button class="filter-btn" onclick="filterByStatus('cancelled', this)">Cancelled</button>
    </div>
    <div id="bookings-list"><p style="color:#888;text-align:center;">Loading...</p></div>
  </div>
</div>

<script>
  const API = 'https://barbershop-production-9507.up.railway.app/api'
  let token = localStorage.getItem('admin-token')
  let currentUser = JSON.parse(localStorage.getItem('admin-user') || 'null')
  let allBookings = []
  let currentFilter = 'all'

  function showAlert(id, message, type) {
    const el = document.getElementById(id)
    el.innerHTML = '<div class="alert ' + type + '">' + message + '</div>'
    setTimeout(() => el.innerHTML = '', 4000)
  }

  async function login() {
    const email = document.getElementById('login-email').value
    const password = document.getElementById('login-password').value
    if (!email || !password) { showAlert('login-alert', 'Please fill all fields.', 'error'); return; }
    const res = await fetch(API + '/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    })
    const data = await res.json()
    if (res.ok) {
      if (data.user.role !== 'admin') {
        showAlert('login-alert', 'Access denied. Admins only.', 'error')
        return
      }
      token = data.token
      currentUser = data.user
      localStorage.setItem('admin-token', token)
      localStorage.setItem('admin-user', JSON.stringify(currentUser))
      showDashboard()
    } else showAlert('login-alert', data.message, 'error')
  }

  function logout() {
    token = null; currentUser = null
    localStorage.removeItem('admin-token')
    localStorage.removeItem('admin-user')
    document.getElementById('page-login').classList.remove('hidden')
    document.getElementById('page-dashboard').classList.add('hidden')
    document.getElementById('nav-auth').classList.add('hidden')
  }

  function showDashboard() {
    document.getElementById('page-login').classList.add('hidden')
    document.getElementById('page-dashboard').classList.remove('hidden')
    document.getElementById('nav-auth').classList.remove('hidden')
    document.getElementById('nav-name').textContent = currentUser.name
    loadBookings()
  }

  async function loadBookings() {
    const res = await fetch(API + '/bookings/all', { headers: {'Authorization':'Bearer ' + token} })
    allBookings = await res.json()
    updateStats()
    renderBookings(allBookings)
  }

  function updateStats() {
    const total = allBookings.length
    const pending = allBookings.filter(b => b.status === 'pending').length
    const confirmed = allBookings.filter(b => b.status === 'confirmed').length
    const revenue = allBookings.filter(b => b.status === 'confirmed').reduce((sum, b) => sum + parseFloat(b.price), 0)
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="number">${total}</div><div class="label">Total bookings</div></div>
      <div class="stat"><div class="number" style="color:#f57f17;">${pending}</div><div class="label">Pending</div></div>
      <div class="stat"><div class="number" style="color:#1a7a3f;">${confirmed}</div><div class="label">Confirmed</div></div>
      <div class="stat"><div class="number">$${revenue.toFixed(2)}</div><div class="label">Revenue</div></div>
    `
  }

  function renderBookings(bookings) {
    const el = document.getElementById('bookings-list')
    if (!bookings.length) { el.innerHTML = '<p style="color:#888;text-align:center;padding:1rem;">No bookings found.</p>'; return; }
    el.innerHTML = bookings.map(b => `
      <div class="booking-row">
        <div style="flex:1;">
          <strong>${b.customer}</strong> — ${b.service}<br>
          <span style="color:#888;">${b.email}</span>
        </div>
        <div style="text-align:center;">
          <div style="font-weight:500;">${b.booking_date}</div>
          <div style="color:#888;font-size:13px;">${b.booking_time}</div>
        </div>
        <div style="text-align:center;">
          <div style="font-weight:500;">$${b.price}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="badge ${b.status}">${b.status}</span>
          <select onchange="updateStatus(${b.id}, this.value)">
            <option value="pending" ${b.status==='pending'?'selected':''}>Pending</option>
            <option value="confirmed" ${b.status==='confirmed'?'selected':''}>Confirmed</option>
            <option value="cancelled" ${b.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
        </div>
      </div>
    `).join('')
  }

  function filterByStatus(status, btn) {
    currentFilter = status
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    filterBookings()
  }

  function filterBookings() {
    const search = document.getElementById('search').value.toLowerCase()
    let filtered = allBookings
    if (currentFilter !== 'all') filtered = filtered.filter(b => b.status === currentFilter)
    if (search) filtered = filtered.filter(b => b.customer.toLowerCase().includes(search) || b.service.toLowerCase().includes(search))
    renderBookings(filtered)
  }

  async function updateStatus(id, status) {
    await fetch(API + '/bookings/' + id, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json','Authorization':'Bearer ' + token},
      body: JSON.stringify({ status })
    })
    loadBookings()
  }

  if (token && currentUser && currentUser.role === 'admin') showDashboard()
</script>
</body>
</html>
