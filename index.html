<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshCuts Barbershop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    nav { background: white; border-bottom: 1px solid #eee; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .logo { font-size: 20px; font-weight: bold; }
    nav button { padding: 7px 16px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 14px; margin-left: 6px; }
    nav button.primary { background: #111; color: white; border-color: #111; }
    .page { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }
    .hidden { display: none !important; }
    .card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .hero { text-align: center; padding: 3rem 1rem; }
    .hero h1 { font-size: 32px; margin-bottom: 0.5rem; }
    .hero p { color: #666; margin-bottom: 1.5rem; }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 1rem; }
    .service-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 1.25rem; cursor: pointer; }
    .service-card:hover { border-color: #aaa; }
    .service-card.selected { border: 2px solid #111; }
    .service-card h3 { font-size: 15px; margin-bottom: 4px; }
    .service-card .price { font-size: 22px; font-weight: bold; color: #111; margin-bottom: 4px; }
    .service-card .duration { font-size: 13px; color: #888; }
    h2.title { font-size: 20px; font-weight: bold; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; }
    .btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 15px; cursor: pointer; margin-top: 8px; }
    .btn.primary { background: #111; color: white; border-color: #111; }
    .btn.primary:hover { background: #333; }
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; }
    .alert.success { background: #e6f9ee; color: #1a7a3f; }
    .alert.error { background: #fdecea; color: #b71c1c; }
    .booking-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 14px; }
    .booking-row:last-child { border-bottom: none; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 12px; }
    .badge.pending { background: #fff8e1; color: #f57f17; }
    .badge.confirmed { background: #e6f9ee; color: #1a7a3f; }
    .badge.cancelled { background: #fdecea; color: #b71c1c; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media(max-width:500px){ .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav>
  <div class="logo">✂️ FreshCuts</div>
  <div id="nav-guest">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('login')">Log in</button>
    <button class="primary" onclick="showPage('register')">Sign up</button>
  </div>
  <div id="nav-auth" class="hidden">
    <span id="nav-name" style="font-size:14px;color:#666;margin-right:8px;"></span>
    <button onclick="showPage('bookings')">My bookings</button>
    <button onclick="showPage('book')">Book now</button>
    <button onclick="logout()">Log out</button>
  </div>
</nav>

<!-- HOME PAGE -->
<div class="page" id="page-home">
  <div class="hero">
    <h1>Your next great haircut starts here</h1>
    <p>Book an appointment with our expert barbers in seconds.</p>
    <button class="btn primary" style="width:auto;padding:10px 28px;" onclick="showPage('book')">Book an appointment</button>
  </div>
  <h2 class="title">Our services</h2>
  <div class="services-grid" id="home-services"></div>
</div>

<!-- REGISTER PAGE -->
<div class="page hidden" id="page-register">
  <div style="max-width:400px;margin:0 auto;">
    <h2 class="title">Create an account</h2>
    <div class="card">
      <div id="reg-alert"></div>
      <div class="form-group"><label>Full name</label><input type="text" id="reg-name" placeholder="John Smith"></div>
      <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="john@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="••••••••"></div>
      <button class="btn primary" onclick="register()">Create account</button>
      <button class="btn" onclick="showPage('login')">Already have an account? Log in</button>
    </div>
  </div>
</div>

<!-- LOGIN PAGE -->
<div class="page hidden" id="page-login">
  <div style="max-width:400px;margin:0 auto;">
    <h2 class="title">Log in</h2>
    <div class="card">
      <div id="login-alert"></div>
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="john@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn primary" onclick="login()">Log in</button>
      <button class="btn" onclick="showPage('register')">No account? Sign up</button>
    </div>
  </div>
</div>

<!-- BOOK PAGE -->
<div class="page hidden" id="page-book">
  <h2 class="title">Book an appointment</h2>
  <div id="book-alert"></div>
  <div class="card">
    <p style="font-size:14px;color:#666;margin-bottom:1rem;">Select a service:</p>
    <div class="services-grid" id="book-services"></div>
    <div class="two-col" style="margin-top:1rem;">
      <div class="form-group"><label>Date</label><input type="date" id="book-date"></div>
      <div class="form-group"><label>Time</label><input type="time" id="book-time" min="09:00" max="18:00"></div>
    </div>
    <button class="btn primary" onclick="createBooking()">Confirm booking</button>
  </div>
</div>

<!-- MY BOOKINGS PAGE -->
<div class="page hidden" id="page-bookings">
  <h2 class="title">My bookings</h2>
  <div class="card" id="bookings-list">
    <p style="color:#888;text-align:center;">Loading...</p>
  </div>
</div>

<!-- ADMIN PAGE -->
<div class="page hidden" id="page-admin">
  <h2 class="title">Admin — all bookings</h2>
  <div class="card" id="admin-list">
    <p style="color:#888;text-align:center;">Loading...</p>
  </div>
</div>

<script>
  const API = 'http://localhost:3000/api'
  let token = localStorage.getItem('token')
  let currentUser = JSON.parse(localStorage.getItem('user') || 'null')
  let selectedService = null

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'))
    document.getElementById('page-' + name).classList.remove('hidden')
    if (name === 'home') loadHomeServices()
    if (name === 'book') {
      if (!token) { showPage('login'); return; }
      loadBookServices()
    }
    if (name === 'bookings') {
      if (!token) { showPage('login'); return; }
      loadMyBookings()
    }
    if (name === 'admin') loadAllBookings()
  }

  function updateNav() {
    if (token && currentUser) {
      document.getElementById('nav-guest').classList.add('hidden')
      document.getElementById('nav-auth').classList.remove('hidden')
      document.getElementById('nav-name').textContent = 'Hi, ' + currentUser.name
    } else {
      document.getElementById('nav-guest').classList.remove('hidden')
      document.getElementById('nav-auth').classList.add('hidden')
    }
  }

  function showAlert(id, message, type) {
    const el = document.getElementById(id)
    el.innerHTML = '<div class="alert ' + type + '">' + message + '</div>'
    setTimeout(() => el.innerHTML = '', 4000)
  }

  async function loadHomeServices() {
    const res = await fetch(API + '/services')
    const services = await res.json()
    document.getElementById('home-services').innerHTML = services.map(s => `
      <div class="service-card">
        <h3>${s.name}</h3>
        <div class="price">$${s.price}</div>
        <div class="duration">${s.duration_minutes} min</div>
      </div>
    `).join('')
  }

  async function loadBookServices() {
    const res = await fetch(API + '/services')
    const services = await res.json()
    document.getElementById('book-services').innerHTML = services.map(s => `
      <div class="service-card" id="svc-${s.id}" onclick="selectService(${s.id})">
        <h3>${s.name}</h3>
        <div class="price">$${s.price}</div>
        <div class="duration">${s.duration_minutes} min</div>
      </div>
    `).join('')
  }

  function selectService(id) {
    selectedService = id
    document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'))
    const el = document.getElementById('svc-' + id)
    if (el) el.classList.add('selected')
  }

  async function register() {
    const name = document.getElementById('reg-name').value
    const email = document.getElementById('reg-email').value
    const password = document.getElementById('reg-password').value
    if (!name || !email || !password) { showAlert('reg-alert', 'Please fill all fields.', 'error'); return; }
    const res = await fetch(API + '/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password })
    })
    const data = await res.json()
    if (res.ok) { showAlert('reg-alert', 'Account created! Please log in.', 'success'); setTimeout(() => showPage('login'), 1500); }
    else showAlert('reg-alert', data.message, 'error')
  }

  async function login() {
    const email = document.getElementById('login-email').value
    const password = document.getElementById('login-password').value
    if (!email || !password) { showAlert('login-alert', 'Please fill all fields.', 'error'); return; }
    const res = await fetch(API + '/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    })
    const data = await res.json()
    if (res.ok) {
      token = data.token
      currentUser = data.user
      localStorage.setItem('token', token)
      localStorage.setItem('user', JSON.stringify(currentUser))
      updateNav()
      if (currentUser.role === 'admin') showPage('admin')
      else showPage('home')
    } else showAlert('login-alert', data.message, 'error')
  }

  function logout() {
    token = null; currentUser = null
    localStorage.removeItem('token')
    localStorage.removeItem('user')
    updateNav()
    showPage('home')
  }

  async function createBooking() {
    if (!selectedService) { showAlert('book-alert', 'Please select a service.', 'error'); return; }
    const date = document.getElementById('book-date').value
    const time = document.getElementById('book-time').value
    if (!date || !time) { showAlert('book-alert', 'Please select a date and time.', 'error'); return; }
    const res = await fetch(API + '/bookings', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization':'Bearer ' + token},
      body: JSON.stringify({ service_id: selectedService, booking_date: date, booking_time: time })
    })
    const data = await res.json()
    if (res.ok) { showAlert('book-alert', 'Booking confirmed!', 'success'); setTimeout(() => showPage('bookings'), 1500); }
    else showAlert('book-alert', data.message, 'error')
  }

  async function loadMyBookings() {
    const res = await fetch(API + '/bookings/my', { headers: {'Authorization':'Bearer ' + token} })
    const bookings = await res.json()
    const el = document.getElementById('bookings-list')
    if (!bookings.length) { el.innerHTML = '<p style="color:#888;text-align:center;">No bookings yet.</p>'; return; }
    el.innerHTML = bookings.map(b => `
      <div class="booking-row">
        <div>
          <strong>${b.service}</strong><br>
          <span style="color:#888;">${b.booking_date} at ${b.booking_time}</span>
        </div>
        <div style="text-align:right;">
          <div>$${b.price}</div>
          <span class="badge ${b.status}">${b.status}</span>
        </div>
      </div>
    `).join('')
  }

  async function loadAllBookings() {
    const res = await fetch(API + '/bookings/all', { headers: {'Authorization':'Bearer ' + token} })
    const bookings = await res.json()
    const el = document.getElementById('admin-list')
    if (!bookings.length) { el.innerHTML = '<p style="color:#888;text-align:center;">No bookings yet.</p>'; return; }
    el.innerHTML = bookings.map(b => `
      <div class="booking-row">
        <div>
          <strong>${b.customer}</strong> — ${b.service}<br>
          <span style="color:#888;">${b.booking_date} at ${b.booking_time}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="badge ${b.status}">${b.status}</span>
          <select onchange="updateStatus(${b.id}, this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid #ddd;font-size:13px;">
            <option value="pending" ${b.status==='pending'?'selected':''}>Pending</option>
            <option value="confirmed" ${b.status==='confirmed'?'selected':''}>Confirmed</option>
            <option value="cancelled" ${b.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
        </div>
      </div>
    `).join('')
  }

  async function updateStatus(id, status) {
    await fetch(API + '/bookings/' + id, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json','Authorization':'Bearer ' + token},
      body: JSON.stringify({ status })
    })
    loadAllBookings()
  }

  updateNav()
  showPage('home')
</script>
</body>
</html>
